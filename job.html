<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Opening | Solid State Pharma</title>
  <meta name="description" content="Open position at Solid State Pharma in Halifax, Nova Scotia.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="careers">

  <section class="page-hero">
    <div class="container">
      <span class="eyebrow" style="color:rgba(255,255,255,0.85);">Careers &mdash; Open Position</span>
      <h1 id="job-title">Open Position</h1>
    </div>
  </section>

  <section class="section">
    <div class="container" style="max-width: 900px;">
      <div class="job-meta">
        <span>&#128205; Halifax, NS Canada</span>
        <span>&#128337; Open until filled</span>
        <span>&#128188; Full Time</span>
      </div>
      <div class="job-body" id="job-body"></div>
      <div style="margin-top: 44px; display:flex; gap:14px; flex-wrap:wrap;">
        <a id="apply-btn" href="mailto:career@solidstatepharma.com" class="btn btn-primary">Apply Now</a>
        <a href="careers.html#openings" class="btn btn-outline">&larr; Back to All Positions</a>
      </div>
    </div>
  </section>

  <section class="cta-band">
    <div class="container">
      <h2>Questions about this role?</h2>
      <p>We&rsquo;d love to hear from you.</p>
      <a href="mailto:career@solidstatepharma.com" class="btn btn-white">career@solidstatepharma.com</a>
    </div>
  </section>

  <script src="js/main.js"></script>
  <script>
    (function () {
      var jobs = {
        "preformulation-scientist": {
          title: "Preformulation Scientist",
          body:
            "<p>Solid State Pharma is seeking a Preformulation Scientist to join our team in beautiful downtown Halifax, Nova Scotia. As part of a team of passionate problem solvers, you will design and execute preformulation studies that help our pharmaceutical clients bring innovative and reliable drugs to patients faster.</p>" +
            "<h2>What You Will Do</h2>" +
            "<ul>" +
            "<li>Design and perform preformulation studies including solubility, stability, pKa, and Log P/D determination</li>" +
            "<li>Support polymorph, salt, and co-crystal screening programs</li>" +
            "<li>Characterize solid forms using PXRD, thermal analysis, and other analytical techniques</li>" +
            "<li>Interpret experimental results and prepare clear, high-quality client reports</li>" +
            "<li>Collaborate closely with our crystallization development and analytical teams</li>" +
            "</ul>" +
            "<h2>What We Are Looking For</h2>" +
            "<ul>" +
            "<li>MSc or PhD in Pharmaceutical Sciences, Chemistry, Chemical Engineering, or a related discipline</li>" +
            "<li>Experience with preformulation and physicochemical characterization of APIs</li>" +
            "<li>Familiarity with solid state science and/or crystallization engineering is a strong asset</li>" +
            "<li>Excellent written and verbal communication skills</li>" +
            "<li>A collaborative, curious mindset and a drive to continuously learn new technologies</li>" +
            "</ul>" +
            "<h2>How to Apply</h2>" +
            "<p>Please send your CV to <a href='mailto:career@solidstatepharma.com'>career@solidstatepharma.com</a> with the subject line &ldquo;Preformulation Scientist&rdquo;. This position is open until filled.</p>"
        },
        "scientist": {
          title: "Scientist",
          body:
            "<p>Solid State Pharma is seeking a Scientist to join our team in beautiful downtown Halifax, Nova Scotia. You will work hands-on across polymorph, salt, and co-crystal screening programs and crystallization process development for pharmaceutical clients around the world.</p>" +
            "<h2>What You Will Do</h2>" +
            "<ul>" +
            "<li>Plan and execute screening experiments to probe the polymorphic landscape of client APIs</li>" +
            "<li>Develop and optimize crystallization processes to control solid form, morphology, and particle size distribution</li>" +
            "<li>Characterize solid forms using PXRD, DSC/TGA, microscopy, and related techniques</li>" +
            "<li>Analyze data rigorously and contribute insightful interpretation &mdash; knowledge, not just data</li>" +
            "<li>Prepare technical reports and participate in client meetings</li>" +
            "</ul>" +
            "<h2>What We Are Looking For</h2>" +
            "<ul>" +
            "<li>MSc or PhD in Chemistry, Chemical Engineering, or a related discipline</li>" +
            "<li>Background in solid state science and/or crystallization engineering preferred</li>" +
            "<li>Strong hands-on laboratory skills and attention to detail</li>" +
            "<li>Interest in continuously learning new technologies in a fast paced environment</li>" +
            "<li>A team player who thrives on collaboration</li>" +
            "</ul>" +
            "<h2>How to Apply</h2>" +
            "<p>Please send your CV to <a href='mailto:career@solidstatepharma.com'>career@solidstatepharma.com</a> with the subject line &ldquo;Scientist&rdquo;. This position is open until filled.</p>"
        },
        "analytical-instrumentation-specialist": {
          title: "Analytical Instrumentation Specialist",
          body:
            "<p>Solid State Pharma is seeking an Analytical Instrumentation Specialist to join our team in beautiful downtown Halifax, Nova Scotia. You will keep our state-of-the-art analytical instrumentation running at peak performance and support the scientists who rely on it every day.</p>" +
            "<h2>What You Will Do</h2>" +
            "<ul>" +
            "<li>Operate, maintain, calibrate, and troubleshoot analytical instrumentation including PXRD, DSC/TGA, and particle size analyzers</li>" +
            "<li>Develop and validate analytical methods in support of client programs</li>" +
            "<li>Maintain instrument qualification documentation in line with our ISO 9001:2015 certified quality management system</li>" +
            "<li>Train scientific staff on instrument operation and best practices</li>" +
            "<li>Coordinate with vendors for service, repairs, and new instrument acquisition</li>" +
            "</ul>" +
            "<h2>What We Are Looking For</h2>" +
            "<ul>" +
            "<li>BSc or MSc in Chemistry, Physics, Engineering, or a related discipline</li>" +
            "<li>Hands-on experience maintaining and troubleshooting analytical laboratory instrumentation</li>" +
            "<li>Experience in a regulated or quality-managed laboratory environment is an asset</li>" +
            "<li>Strong organizational skills and meticulous documentation habits</li>" +
            "<li>A proactive, service-oriented approach to supporting a busy laboratory</li>" +
            "</ul>" +
            "<h2>How to Apply</h2>" +
            "<p>Please send your CV to <a href='mailto:career@solidstatepharma.com'>career@solidstatepharma.com</a> with the subject line &ldquo;Analytical Instrumentation Specialist&rdquo;. This position is open until filled.</p>"
        }
      };

      var params = new URLSearchParams(window.location.search);
      var job = jobs[params.get("job")] || jobs["scientist"];

      document.title = job.title + " | Careers | Solid State Pharma";
      document.getElementById("job-title").textContent = job.title;
      document.getElementById("job-body").innerHTML = job.body;
      document.getElementById("apply-btn").href =
        "mailto:career@solidstatepharma.com?subject=" + encodeURIComponent("Application: " + job.title);
    })();
  </script>
</body>
</html>
